services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: surie_db
      POSTGRES_USER: surie
      POSTGRES_PASSWORD: surie_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surie -d surie_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
